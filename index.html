<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Official Invitation</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #f4f4f4; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; width: 500px; padding: 40px; border: 2px solid #d4af37; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #2c3e50; font-variant: small-caps; letter-spacing: 2px; }
        .divider { height: 1px; width: 100px; background: #d4af37; margin: 20px auto; }
        .content { font-size: 1.1em; line-height: 1.6; color: #333; }
        .footer { margin-top: 30px; font-style: italic; color: #777; }
        .button { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #2c3e50; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Official Invitation</h1>
        <div class="divider"></div>
        <div class="content">
            <p>The Board of Directors of <strong>Global Tech Corp</strong></p>
            <p>requests the honor of your presence at the</p>
            <p style="font-weight: bold; font-size: 1.3em;">Annual Gala Dinner 2026</p>
            <p>on Tuesday, the 7th of April<br>at seven o'clock in the evening</p>
            <p>Grand Ballroom, Plaza Hotel<br>Jakarta, Indonesia</p>
        </div>
        <div class="footer">
            <p>RSVP by April 1st<br>Dress Code: Black Tie</p>
            <a href="mailto:rsvp@company.com" class=></a>
        </div>
    </div>
</body>
</html>
